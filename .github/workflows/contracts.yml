name: Contract tests

on:
  pull_request:
    paths:
      - "schemas/**"
      - "fixtures/synthetic/**"
      - "tests/contracts/**"
      - ".github/workflows/contracts.yml"
  push:
    branches:
      - main
    paths:
      - "schemas/**"
      - "fixtures/synthetic/**"
      - "tests/contracts/**"
      - ".github/workflows/contracts.yml"

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run public-safe contract suite
        run: python -m unittest discover -s tests/contracts -v
